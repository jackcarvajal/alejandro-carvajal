<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1200px;height:630px;background:#050505;font-family:Inter,system-ui,sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px;position:relative;}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(147,51,234,.12),transparent);pointer-events:none;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(147,51,234,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(147,51,234,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.inner{position:relative;z-index:1;max-width:800px;}
.brand{font-size:12px;font-weight:900;letter-spacing:5px;text-transform:uppercase;color:#9333ea;margin-bottom:20px;}
h1{font-size:60px;font-weight:900;line-height:1.0;background:linear-gradient(135deg,#9333ea,#D946A6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
.sub{font-size:19px;color:#94a3b8;line-height:1.5;margin-bottom:32px;}
.pills{display:flex;gap:10px;justify-content:center;}
.pill{padding:6px 18px;border-radius:50px;font-size:13px;font-weight:700;border:1px solid #9333ea;color:#9333ea;}
</style>
</head>
<body>
<div class="bg"></div><div class="grid"></div>
<div class="inner">
  <div class="brand">Alejandro Carvajal CAD/CAM Bogota Colombia</div>
  <h1>Blog Alejandro Carvajal</h1>
  <p class="sub">Articulos de diseno CAD, Exocad, materiales y flujos digitales.</p>
  <div class="pills"><div class="pill">CAD/CAM</div><div class="pill">Exocad</div><div class="pill">Tecnica</div></div>
</div>
</body>
</html>
