<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#D946A6">
<meta name="color-scheme" content="dark">
<title>Cancelar suscripción — Alejandro Carvajal CAD/CAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"></noscript>
<style>
:root{--mg:#D946A6;--gold:#D4AF37;--bg:#050505;--card:#0d1520;--text:#e2e8f0;--muted:#94a3b8;--border:rgba(255,255,255,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:440px;width:100%;text-align:center;}
.icon{font-size:3rem;margin-bottom:20px;}
h1{font-size:1.5rem;font-weight:900;margin-bottom:12px;}
p{color:var(--muted);font-size:.92rem;line-height:1.65;margin-bottom:24px;}
.btn{display:inline-block;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:10px;font-weight:700;font-size:.9rem;text-decoration:none;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn:hover{border-color:rgba(217,70,166,.4);}
.btn-danger{background:rgba(217,70,166,.1);border-color:rgba(217,70,166,.4);color:var(--mg);}
.msg{font-size:.85rem;margin-top:16px;min-height:24px;}
</style>
</head>
<body>
<div class="card" id="card-content">
  <div class="icon" id="icon">📧</div>
  <h1 id="title">Cancelar suscripción</h1>
  <p id="desc">¿Deseas cancelar tu suscripción al newsletter de Alejandro Carvajal CAD/CAM? No recibirás más correos promocionales.</p>
  <button class="btn btn-danger" id="btn-unsub">Sí, cancelar suscripción</button>
  <br><br>
  <a href="/" class="btn">Volver al inicio</a>
  <div class="msg" id="msg" aria-live="polite"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  const SURL='https://zgihrwqfyvgyapbwzkvw.supabase.co';
  const SANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaWhyd3FmeXZneWFwYnd6a3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzczNDksImV4cCI6MjA5MDg1MzM0OX0.9CzmFDQYeQKcbtAZoT1_n_OuJ1qPVJu3jImd938T634';
  const sb = window.supabase.createClient(SURL, SANON);
  const token = new URLSearchParams(location.search).get('token');
  const btn = document.getElementById('btn-unsub');
  const msg = document.getElementById('msg');

  if (!token) {
    document.getElementById('desc').textContent = 'No se encontró un token válido en el enlace. Verifica que copiaste el enlace completo del correo.';
    if (btn) btn.disabled = true;
    return;
  }

  btn.addEventListener('click', async function() {
    btn.disabled = true;
    btn.textContent = 'Procesando...';
    try {
      const { data, error } = await sb.rpc('newsletter_unsubscribe', { p_token: token });
      if (error) throw error;
      if (data) {
        document.getElementById('icon').textContent = '✅';
        document.getElementById('title').textContent = 'Suscripción cancelada';
        document.getElementById('desc').textContent = 'Tu correo ha sido eliminado de nuestra lista de newsletter. No recibirás más correos promocionales.';
        btn.style.display = 'none';
      } else {
        msg.style.color = '#f87171';
        msg.textContent = 'El enlace ya no es válido o ya fue usado.';
        btn.textContent = 'Reintentar';
        btn.disabled = false;
      }
    } catch(e) {
      msg.style.color = '#f87171';
      msg.textContent = 'Error al procesar. Por favor intenta de nuevo.';
      btn.textContent = 'Sí, cancelar suscripción';
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
