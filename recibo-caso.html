<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Recibo Técnico — Alejandro CAD/CAM</title>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ── SCREEN ── */
:root{--gold:#D4AF37;--mg:#D946A6;--cyan:#00d2ff;--green:#00FF41;--bg:#050505;--card:#0d1520;--text:#e2e8f0;--muted:#94a3b8;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:40px 24px;}
.no-print{display:block;}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap;}
.topbar h1{font-size:1rem;font-weight:900;color:var(--gold);letter-spacing:2px;}
.btn-pdf{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:linear-gradient(135deg,var(--mg),#9333ea);color:#fff;border:none;border-radius:8px;font-weight:800;font-size:.88rem;cursor:pointer;}
.btn-pdf:hover{opacity:.88;}

.recibo{background:#fff;color:#1a1a2e;max-width:780px;margin:0 auto;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5);}

/* HEADER */
.rec-header{background:linear-gradient(135deg,#1a1a2e,#0f1629);color:#fff;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.rec-logo h2{font-size:1.2rem;font-weight:900;letter-spacing:2px;color:#D4AF37;margin-bottom:2px;}
.rec-logo p{font-size:.72rem;color:#94a3b8;}
.rec-meta{text-align:right;}
.rec-meta .rec-num{font-size:1.1rem;font-weight:900;color:#D4AF37;font-family:monospace;}
.rec-meta .rec-tipo{font-size:.62rem;font-weight:700;letter-spacing:2px;color:#94a3b8;text-transform:uppercase;margin-bottom:4px;}

/* SECCIONES */
.rec-body{padding:28px 32px;}
.rec-section{margin-bottom:24px;}
.rec-section-title{font-size:.62rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#1a1a2e,#0f1629);padding:7px 14px;border-radius:6px;margin-bottom:12px;display:inline-block;}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;}
.rec-field{margin-bottom:4px;}
.rec-field .lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:2px;}
.rec-field .val{font-size:.88rem;font-weight:600;color:#1a1a2e;}

/* TIMELINE */
.timeline{list-style:none;padding-left:0;}
.tl-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.tl-item:last-child{border-bottom:none;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:#D4AF37;flex-shrink:0;margin-top:5px;}
.tl-dot.aprobado{background:#00c851;}
.tl-dot.entregado{background:#00c851;}
.tl-dot.pago{background:#00d2ff;}
.tl-fecha{font-size:.72rem;color:#94a3b8;min-width:140px;flex-shrink:0;}
.tl-desc{font-size:.82rem;color:#1a1a2e;font-weight:500;}

/* PAGO */
.pago-box{background:#f8fafb;border:2px solid #e2e8f0;border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.pago-total{font-size:1.6rem;font-weight:900;color:#1a1a2e;}
.pago-total span{font-size:.72rem;color:#94a3b8;display:block;font-weight:500;margin-bottom:2px;}
.pago-estado{padding:6px 16px;border-radius:20px;font-size:.75rem;font-weight:800;}
.pago-estado.confirmado{background:#e8fdf0;color:#00873d;border:1px solid #00c851;}
.pago-estado.pendiente{background:#fef9e7;color:#b7791f;border:1px solid #f6e05e;}
.pago-estado.subido{background:#e8f4ff;color:#1a7acc;border:1px solid #63b3ed;}

/* FOOTER */
.rec-footer{background:#f8fafb;border-top:2px solid #e2e8f0;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.rec-footer p{font-size:.72rem;color:#94a3b8;}
.rec-footer .legal{font-size:.65rem;color:#cbd5e1;max-width:400px;line-height:1.6;}

/* SPINNER / ERROR */
.loader{text-align:center;padding:60px;color:var(--muted);font-size:.9rem;}
.loader i{font-size:2rem;display:block;margin-bottom:12px;animation:spin .8s linear infinite;color:var(--gold);}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:60px;color:#f87171;}
.error-box i{font-size:2.5rem;display:block;margin-bottom:12px;}

/* ── PRINT ── */
@media print{
  body{background:#fff;padding:0;}
  .no-print{display:none!important;}
  .recibo{box-shadow:none;border-radius:0;max-width:100%;}
  .rec-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .rec-section-title{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pago-estado{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:15mm;}
}
</style>
</head>
<body>

<div class="no-print topbar">
  <h1>👑 ALEJANDRO CAD/CAM — Recibo Técnico</h1>
  <button class="btn-pdf" onclick="window.print()"><i class="fas fa-file-pdf"></i> Descargar PDF</button>
</div>

<div id="recibo-wrap">
  <div class="loader"><i class="fas fa-circle-notch"></i>Cargando datos del caso…</div>
</div>

<script>
const SUPA_URL  = 'https://zgihrwqfyvgyapbwzkvw.supabase.co';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaWhyd3FmeXZneWFwYnd6a3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzczNDksImV4cCI6MjA5MDg1MzM0OX0.9CzmFDQYeQKcbtAZoT1_n_OuJ1qPVJu3jImd938T634';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function escH(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── i18n automático por idioma del navegador ── */
const LANG = (navigator.language||'es').toLowerCase().startsWith('en')?'en':(navigator.language||'es').toLowerCase().startsWith('pt')?'pt':'es';
const T = {
  es:{recibo:'Recibo Técnico',datos:'Datos del Caso',servicio:'Servicio Realizado',timeline:'Timeline del Caso',pago:'Pago',codigo:'Código',fecha_rec:'Fecha recepción',cliente:'Cliente / Doctor',email:'Email',clinica:'Clínica',tipo_srv:'Tipo de servicio',material:'Material sugerido',revisiones:'Revisiones usadas',fecha_apr:'Fecha aprobación',piezas:'Piezas',nota:'Nota',total:'Total',metodo:'Método',doc_gen:'Documento generado',legal:'Documento de trazabilidad técnica y contable.',ev_recibido:'Caso recibido',ev_pago:'Pago confirmado',ev_diseno:'Diseño enviado',ev_cambios:'Cambios solicitados',ev_aprobado:'Diseño APROBADO',ev_entregado:'STL entregado',sin_eventos:'Sin eventos registrados.',pago_ok:'✅ Pagado',pago_pend:'⏳ Pendiente',pago_sub:'⏳ En revisión',demo_badge:'DEMO — Datos de ejemplo'},
  en:{recibo:'Technical Receipt',datos:'Case Data',servicio:'Service Performed',timeline:'Case Timeline',pago:'Payment',codigo:'Code',fecha_rec:'Reception date',cliente:'Doctor / Client',email:'Email',clinica:'Clinic',tipo_srv:'Service type',material:'Suggested material',revisiones:'Revisions used',fecha_apr:'Approval date',piezas:'Teeth',nota:'Note',total:'Total',metodo:'Method',doc_gen:'Generated on',legal:'Technical and accounting traceability document.',ev_recibido:'Case received',ev_pago:'Payment confirmed',ev_diseno:'Design sent',ev_cambios:'Changes requested',ev_aprobado:'Design APPROVED',ev_entregado:'STL delivered',sin_eventos:'No events recorded.',pago_ok:'✅ Paid',pago_pend:'⏳ Pending',pago_sub:'⏳ Under review',demo_badge:'DEMO — Sample data'},
  pt:{recibo:'Recibo Técnico',datos:'Dados do Caso',servicio:'Serviço Realizado',timeline:'Linha do Tempo',pago:'Pagamento',codigo:'Código',fecha_rec:'Data de recepção',cliente:'Doutor / Cliente',email:'E-mail',clinica:'Clínica',tipo_srv:'Tipo de serviço',material:'Material sugerido',revisiones:'Revisões usadas',fecha_apr:'Data de aprovação',piezas:'Dentes',nota:'Nota',total:'Total',metodo:'Método',doc_gen:'Documento gerado',legal:'Documento de rastreabilidade técnica e contábil.',ev_recibido:'Caso recebido',ev_pago:'Pagamento confirmado',ev_diseno:'Design enviado',ev_cambios:'Alterações solicitadas',ev_aprobado:'Design APROVADO',ev_entregado:'STL entregue',sin_eventos:'Nenhum evento registrado.',pago_ok:'✅ Pago',pago_pend:'⏳ Pendente',pago_sub:'⏳ Em análise',demo_badge:'DEMO — Dados de exemplo'}
};
const t = T[LANG];

function fmtFecha(ts,opts){if(!ts)return'—';return new Date(ts).toLocaleDateString(LANG==='en'?'en-US':LANG==='pt'?'pt-BR':'es-CO',opts||{day:'2-digit',month:'short',year:'numeric'});}
function fmtFechaHora(ts){if(!ts)return'—';return new Date(ts).toLocaleDateString(LANG==='en'?'en-US':LANG==='pt'?'pt-BR':'es-CO',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function pagoEstadoBadge(estado){
  const map={pago_confirmado:'confirmado',pendiente:'pendiente',pago_subido:'subido'};
  const lbl={pago_confirmado:'✅ Pagado',pendiente:'⏳ Pendiente',pago_subido:'⏳ En revisión'};
  const cls=map[estado]||'pendiente';
  return`<span class="pago-estado ${cls}">${lbl[estado]||estado}</span>`;
}

function buildTimeline(pedido, revisiones){
  const items=[];
  if(pedido.created_at) items.push({ts:pedido.created_at,desc:t.ev_recibido,cls:''});
  if(pedido.pago_estado==='pago_confirmado'&&pedido.updated_at) items.push({ts:pedido.updated_at,desc:t.ev_pago,cls:'pago'});
  (revisiones||[]).forEach(r=>{
    if(r.creado_en) items.push({ts:r.creado_en,desc:`${t.ev_diseno} (Rev ${r.revision_num})`,cls:''});
    if(r.notas_cliente) items.push({ts:r.creado_en,desc:`${t.ev_cambios}: "${escH(r.notas_cliente)}"`,cls:''});
  });
  if(pedido.diseno_aprobado&&pedido.updated_at) items.push({ts:pedido.updated_at,desc:t.ev_aprobado,cls:'aprobado'});
  if((pedido.estado||'').includes('entregado')&&pedido.updated_at) items.push({ts:pedido.updated_at,desc:t.ev_entregado,cls:'entregado'});
  items.sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  if(!items.length) return`<p style="color:#94a3b8;font-size:.82rem;">${t.sin_eventos}</p>`;
  return`<ul class="timeline">${items.map(i=>`<li class="tl-item"><div class="tl-dot ${escH(i.cls)}"></div><span class="tl-fecha">${fmtFechaHora(i.ts)}</span><span class="tl-desc">${i.desc}</span></li>`).join('')}</ul>`;
}

function render(pedido, revisiones){
  const rev=revisiones||[];
  const codigo=pedido.codigo||pedido.id?.slice(0,8)||'—';
  const docGen=fmtFecha(new Date().toISOString());
  const aprobFecha=pedido.diseno_aprobado?fmtFechaHora(pedido.updated_at):'—';

  document.getElementById('recibo-wrap').innerHTML=`
  <div class="recibo">
    <div class="rec-header">
      <div class="rec-logo">
        <h2>👑 ALEJANDRO CAD/CAM</h2>
        <p>alejandrocadcam.pages.dev · jackalejandroc@gmail.com</p>
      </div>
      <div class="rec-meta">
        <div class="rec-tipo">Recibo Técnico</div>
        <div class="rec-num">#${escH(codigo)}</div>
      </div>
    </div>

    <div class="rec-body">

      <div class="rec-section">
        <div class="rec-section-title"><i class="fas fa-folder-open" style="margin-right:6px"></i>${t.datos}</div>
        <div class="rec-grid">
          <div class="rec-field"><div class="lbl">${t.codigo}</div><div class="val" style="font-family:monospace">${escH(codigo)}</div></div>
          <div class="rec-field"><div class="lbl">${t.fecha_rec}</div><div class="val">${fmtFecha(pedido.created_at)}</div></div>
          <div class="rec-field"><div class="lbl">${t.cliente}</div><div class="val">${escH(pedido.doctor||pedido.nombre||'—')}</div></div>
          <div class="rec-field"><div class="lbl">${t.email}</div><div class="val">${escH(pedido.email||'—')}</div></div>
          ${pedido.clinica?`<div class="rec-field"><div class="lbl">${t.clinica}</div><div class="val">${escH(pedido.clinica)}</div></div>`:''}
        </div>
      </div>

      <div class="rec-section">
        <div class="rec-section-title"><i class="fas fa-drafting-compass" style="margin-right:6px"></i>${t.servicio}</div>
        <div class="rec-grid">
          <div class="rec-field"><div class="lbl">${t.tipo_srv}</div><div class="val">${escH(pedido.servicio||pedido.categoria||'Diseño CAD')}</div></div>
          <div class="rec-field"><div class="lbl">${t.material}</div><div class="val">${escH(pedido.material||'—')}</div></div>
          <div class="rec-field"><div class="lbl">${t.revisiones}</div><div class="val">${escH(String(pedido.revisiones_usadas||0))} / 2</div></div>
          <div class="rec-field"><div class="lbl">${t.fecha_apr}</div><div class="val">${escH(aprobFecha)}</div></div>
          ${pedido.piezas?`<div class="rec-field"><div class="lbl">${t.piezas}</div><div class="val">${escH(String(pedido.piezas))}</div></div>`:''}
          ${pedido.nota_interna?`<div class="rec-field" style="grid-column:1/-1"><div class="lbl">${t.nota}</div><div class="val">${escH(pedido.nota_interna)}</div></div>`:''}
        </div>
      </div>

      <div class="rec-section">
        <div class="rec-section-title"><i class="fas fa-timeline" style="margin-right:6px"></i>${t.timeline}</div>
        ${buildTimeline(pedido,rev)}
      </div>

      ${(()=>{
        // Fotos del diseño: primero fotos_feedback, luego galería de la revisión aprobada
        const fotosFb = Array.isArray(pedido.fotos_feedback) ? pedido.fotos_feedback.slice(0,3) : [];
        const fotosRev = rev.length ? (rev[rev.length-1].fotos_cliente||[]).slice(0,3) : [];
        const fotos = fotosFb.length ? fotosFb : fotosRev;
        if(!fotos.length) return '';
        return `<div class="rec-section">
          <div class="rec-section-title"><i class="fas fa-images" style="margin-right:6px"></i>📸 ${LANG==='en'?'Approved Design — Final Views':LANG==='pt'?'Design Aprovado — Vistas Finais':'Diseño Aprobado — Vistas Finales'}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
            ${fotos.map((url,i)=>`
              <div style="border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;">
                <img src="${escH(url)}" alt="Vista ${i+1}" style="width:100%;height:130px;object-fit:cover;display:block;" onerror="this.style.display='none'">
              </div>`).join('')}
          </div>
          <div style="font-size:.65rem;color:#94a3b8;margin-top:6px;text-align:center">${LANG==='en'?'Final approved design images':'Imágenes del diseño aprobado'}</div>
        </div>`;
      })()}

      <div class="rec-section">
        <div class="rec-section-title"><i class="fas fa-credit-card" style="margin-right:6px"></i>${t.pago}</div>
        <div class="pago-box">
          <div class="pago-total"><span>${t.total}</span>${pedido.total?'$'+Number(pedido.total).toFixed(0)+' USD':'—'}</div>
          <div>
            <div style="font-size:.72rem;color:#94a3b8;margin-bottom:4px;">${t.metodo}: Wise / Nequi / Bancolombia</div>
            ${pagoEstadoBadge(pedido.pago_estado||'pendiente')}
          </div>
        </div>
      </div>

    </div>

    <div class="rec-footer">
      <p>${t.doc_gen}: ${escH(docGen)}</p>
      <p class="legal">© ${new Date().getFullYear()} Alejandro Carvajal CAD/CAM · jackalejandroc@gmail.com · WhatsApp +57 321 958 1949 · ${t.legal}</p>
    </div>
  </div>`;
}

/* ── DATOS DEMO ── */
const DEMO_PEDIDO = {
  id:'demo-0000',codigo:'CAD-7K3M9X2F',
  doctor:'Dr. Carlos Martínez',email:'carlos.martinez@clinica.com',clinica:'Clínica Dental Sonrisas · Medellín',
  servicio:'Carillas & DSD',material:'Disilicato e.max',categoria:'estetica',
  revisiones_usadas:1,piezas:'11,12,21,22',
  total:96,pago_estado:'pago_confirmado',diseno_aprobado:true,
  fotos_feedback:['https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=400&q=75','https://images.unsplash.com/photo-1588776814546-1ffbb3cd3de4?w=400&q=75','https://images.unsplash.com/photo-1559329007-40df8a9345d8?w=400&q=75'],
  estado:'entregado',
  created_at:new Date(Date.now()-3*24*60*60*1000).toISOString(),
  updated_at:new Date(Date.now()-1*60*60*1000).toISOString(),
  nota_interna:'Caso estético de 4 carillas. Color A1 Vita. Emergencia gingival suave.'
};
const DEMO_REVS = [
  {id:'r1',pedido_id:'demo-0000',revision_num:1,link_html:'#',stl_ruta:'demo/v1.stl',notas_cliente:'Aumentar el tamaño de los incisivos laterales',creado_en:new Date(Date.now()-2*24*60*60*1000).toISOString()},
  {id:'r2',pedido_id:'demo-0000',revision_num:2,link_html:'#',stl_ruta:'demo/v2.stl',notas_cliente:null,creado_en:new Date(Date.now()-26*60*60*1000).toISOString()}
];

(async function init(){
  const params=new URLSearchParams(location.search);

  /* ── MODO DEMO: sin auth, datos falsos ── */
  if(params.get('demo')==='1'){
    const demoBanner=document.createElement('div');
    demoBanner.innerHTML=`<div style="background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.4);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:.78rem;color:#D4AF37;text-align:center;font-weight:700">⚠️ ${t.demo_badge}</div>`;
    document.querySelector('.topbar').after(demoBanner);
    render(DEMO_PEDIDO, DEMO_REVS);
    return;
  }

  /* ── MODO REAL: verificar sesión inline ── */
  const {data:{session}} = await sb.auth.getSession();
  if(!session){
    window.location.href='/app/login?redirect='+encodeURIComponent(location.pathname+location.search);
    return;
  }

  const id=params.get('id');
  if(!id){
    document.getElementById('recibo-wrap').innerHTML=`<div class="error-box"><i class="fas fa-exclamation-triangle"></i>No se especificó un ID de caso. Usa ?id=CODIGO en la URL.</div>`;
    return;
  }

  try{
    // Buscar por id o por codigo
    let{data,error}=await sb.from('pedidos').select('*').eq('negocio','alejandrocadcam').or(`id.eq.${id},codigo.eq.${id}`).single();
    if(error||!data){
      // segundo intento solo por codigo
      const r2=await sb.from('pedidos').select('*').eq('negocio','alejandrocadcam').eq('codigo',id).maybeSingle();
      if(r2.error||!r2.data){
        document.getElementById('recibo-wrap').innerHTML=`<div class="error-box"><i class="fas fa-exclamation-triangle"></i>Caso no encontrado: ${escH(id)}</div>`;
        return;
      }
      data=r2.data;
    }

    const{data:revs}=await sb.from('diseno_revisiones').select('*').eq('pedido_id',data.id).order('revision_num',{ascending:true});
    render(data,revs||[]);
  }catch(e){
    document.getElementById('recibo-wrap').innerHTML=`<div class="error-box"><i class="fas fa-exclamation-triangle"></i>Error: ${escH(String(e.message||e))}</div>`;
  }
})();
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});</script>
</body>
</html>
