# ============================================================
# Alejandro Carvajal CAD/CAM — Auto-Article Generator
# Motor: Google Gemini 2.0 Flash
# Estándar: solo revistas indexadas con DOI verificable
# Cron: lunes y miércoles 9:00 AM Bogotá (14:00 UTC)
# Social copy: GitHub Actions Artifact (privado)
# ============================================================

name: Alejandro Auto-Article

on:
  schedule:
    - cron: '0 14 * * 1'   # Lunes 9 AM Bogotá
    - cron: '0 14 * * 3'   # Miércoles 9 AM Bogotá
  workflow_dispatch:        # Ejecución manual desde GitHub Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar artículo (Gemini + Wikipedia)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-articulo-ac.js

      - name: Verificar cambios
        id: changes
        run: |
          git diff --quiet articles-ac.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit y push artículo nuevo
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "Alejandro Article Bot"
          git config user.email "bot@alejandrocadcam.pages.dev"
          git add articles-ac.js sitemap.xml
          git commit -m "feat(blog): $(date +'%Y-%m-%d') — artículo técnico auto-generado [skip ci]"
          git push

      - name: Subir social copy como Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-copy-ac-${{ github.run_id }}
          path: marketing-social-ac.txt
          retention-days: 30

      - name: Resumen
        if: always()
        run: |
          echo "## 📰 Alejandro CAD/CAM — Auto-Article" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** $(date +'%d/%m/%Y %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Estándar:** Solo revistas indexadas con DOI verificable" >> $GITHUB_STEP_SUMMARY
          if [ -f articles-ac.js ]; then
            grep '"titulo"' articles-ac.js | head -1 | sed 's/.*"titulo": "\(.*\)".*/- \1/' >> $GITHUB_STEP_SUMMARY
          fi
          echo "📎 Ver Artifact **social-copy-ac-${{ github.run_id }}** en esta página." >> $GITHUB_STEP_SUMMARY
